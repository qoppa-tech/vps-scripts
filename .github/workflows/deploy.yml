name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'playbook.yml'
      - 'roles/**'
      - 'group_vars/**'
      - 'inventory'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
env:
  VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}

jobs:

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Ansible and dependencies
        run: pip install ansible passlib

      - name: Install Ansible Galaxy roles
        run: ansible-galaxy role install -r requirements.yml

      - name: Setup SSH
        run: |
          set -euo pipefail
          if [ -z "${{ env.VPS_SSH_KEY }}" ]; then
            echo "VPS_SSH_KEY is empty or not set" >&2
            exit 1
          fi
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Write SSH key, handling optional base64 encoding and stripping CRLF.
          KEY_CONTENT="${{ env.VPS_SSH_KEY }}"
          if echo "$KEY_CONTENT" | grep -q "^LS0tLS1CRUdJTiBPUEVOU1NIIFBSSVZBVEUgS0VZ"; then
            echo "$KEY_CONTENT" | tr -d '\r' | base64 -d > ~/.ssh/id_ed25519
          else
            printf '%s\n' "$KEY_CONTENT" | tr -d '\r' > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519
          # Fail fast if the key is invalid.
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 > ~/.ssh/id_ed25519.pub; then
            echo "Provided VPS_SSH_KEY is not a valid private key" >&2
            exit 1
          fi
          # Add host key to known_hosts to avoid host key prompts.
          ssh-keyscan -T 10 -H 159.65.64.206 >> ~/.ssh/known_hosts 2>/dev/null
      - name: Create secrets file
        run: |
          mkdir -p group_vars
          cat > group_vars/secrets.yml << EOF
          user_password: "${{ env.USER_PASSWORD }}"
          postgres_password: "${{ env.POSTGRES_PASSWORD }}"
          ghcr_user: "${{ github.repository_owner }}"
          ghcr_token: "${{ env.GHCR_TOKEN }}"
          EOF
      - name: Dry-run (check mode)
        id: check
        run: |
          set -euo pipefail
          ansible-playbook -i inventory playbook.yml --check -v | tee /tmp/ansible-check.log
          if grep -q "changed=0.*failed=0" /tmp/ansible-check.log; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "--- check summary ---"
          tail -n 20 /tmp/ansible-check.log
      - name: Run Ansible playbook (apply)
        if: steps.check.outputs.changed == 'true'
        run: ansible-playbook -i inventory playbook.yml -v

      - name: Cleanup
        if: always()
        run: |
          rm -rf ~/.ssh/id_ed25519 group_vars/secrets.yml
          shred -fuz ~/.ssh/id_ed25519 group_vars/secrets.yml 2>/dev/null || true