# Parlor VPS Deployment Playbook
- name: Configure Server
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  roles:
    - configure_server

- name: Install Docker
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  vars:
    deploy_user: parloruser
  pre_tasks:
    - name: Remove stale Docker repo files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/trusted.gpg.d/docker.asc
      ignore_errors: true
  roles:
    - docker_install

- name: Setup Traefik Reverse Proxy
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  vars:
    landing_domain: landing.parlorharpia.tech
    api_domain: api.parlorharpia.tech
    acme_email: "{{ admin_email | default('admin@parlorharpia.tech') }}"
  roles:
    - traefik

- name: Setup PostgreSQL
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  roles:
    - postgresql

- name: Setup Redis
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  roles:
    - redis

- name: Deploy API Core
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  vars:
    deploy_user: parloruser
    apicore_app_dir: /home/{{ deploy_user }}/api-core
    apicore_image: ghcr.io/parlorhub/api-core:latest
    apicore_port: 8080
    postgres_host: postgres
    redis_host: redis
  roles:
    - deploy_apicore

- name: Deploy Landing Page
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  vars:
    deploy_user: parloruser
    landing_app_dir: /home/{{ deploy_user }}/landing
    landing_image: ghcr.io/parlorhub/landing-page:latest
    landing_port: 4321
  roles:
    - deploy_landing
