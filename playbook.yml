# Parlor VPS Deployment Playbook
- name: Configure Server
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  roles:
    - configure_server

- name: Install Docker
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  vars:
    docker_install_compose_plugin: true
    docker_install_buildx_plugin: true
    docker_users:
      - "{{ deploy_user }}"
  roles:
    - geerlingguy.docker
  tasks:
    - name: Login to GitHub Container Registry
      ansible.builtin.shell: |
        echo "{{ ghcr_token }}" | docker login ghcr.io -u {{ ghcr_user }} --password-stdin
      become: true
      become_user: "{{ deploy_user }}"
      when: ghcr_token is defined and ghcr_token | length > 0
      no_log: true

- name: Setup Traefik Reverse Proxy
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  vars:
    landing_domain: landing.parlorharpia.tech
    api_domain: api.parlorharpia.tech
    acme_email: "{{ admin_email | default('admin@parlorharpia.tech') }}"
  roles:
    - traefik

- name: Setup PostgreSQL
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  roles:
    - postgresql

- name: Setup Redis
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  roles:
    - redis

- name: Deploy API Core
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  vars:
    apicore_image: ghcr.io/parlorhub/api-core:latest
    postgres_host: postgres
    redis_host: redis
  roles:
    - deploy_apicore

- name: Deploy Landing Page
  hosts: vps
  become: true
  vars_files:
    - group_vars/secrets.yml
  vars:
    landing_image: ghcr.io/parlorhub/landing-page:latest
  roles:
    - deploy_landing
