---
# tasks file for deploy_apicore

- name: Create app directory
  ansible.builtin.file:
    path: "{{ apicore_app_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'

- name: Deploy docker-compose.yml for api-core
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ apicore_app_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0644'
  notify: Restart api-core

- name: Deploy .env file for api-core
  ansible.builtin.template:
    src: env.j2
    dest: "{{ apicore_app_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0600'
  notify: Restart api-core

- name: Pull latest api-core image
  ansible.builtin.shell: |
    cd {{ apicore_app_dir }}
    sudo docker compose pull
  become: true
  become_user: "{{ deploy_user }}"
  register: pull_result
  changed_when: "'Downloaded' in pull_result.stdout or 'Pull complete' in pull_result.stdout"

- name: Create migrations directory
  ansible.builtin.file:
    path: "{{ apicore_app_dir }}/migrations"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'

- name: Extract migrations from api-core image
  ansible.builtin.shell: |
    sudo docker create --name api-core-temp {{ apicore_image }} 2>/dev/null || true
    sudo docker cp api-core-temp:/migrations/. {{ apicore_app_dir }}/migrations/ 2>/dev/null || true
    sudo docker rm api-core-temp 2>/dev/null || true
  become: true
  become_user: "{{ deploy_user }}"
  changed_when: false
  failed_when: false

- name: Run database migrations
  ansible.builtin.shell: |
    sudo docker run --rm --network parlor-network \
      -v {{ apicore_app_dir }}/migrations:/migrations \
      migrate/migrate \
      -path=/migrations \
      -database "postgres://{{ postgres_user }}:{{ postgres_password }}@{{ postgres_host }}:{{ postgres_port }}/{{ postgres_db }}?sslmode=disable" up
  become: true
  become_user: "{{ deploy_user }}"
  register: migrate_result
  changed_when: "'no change' not in migrate_result.stdout"
  failed_when: false

- name: Start api-core containers
  ansible.builtin.shell: |
    cd {{ apicore_app_dir }}
    sudo docker compose up -d --remove-orphans
  become: true
  become_user: "{{ deploy_user }}"
  register: compose_result
  changed_when: "'Started' in compose_result.stdout or 'Creating' in compose_result.stdout"
