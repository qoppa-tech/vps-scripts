---
# tasks file for postgresql

- name: Create PostgreSQL data directory
  ansible.builtin.file:
    path: "{{ postgres_data_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'

- name: Create PostgreSQL app directory
  ansible.builtin.file:
    path: "{{ postgres_app_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0755'

- name: Deploy docker-compose.yml for PostgreSQL
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ postgres_app_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: '0644'

- name: Start PostgreSQL container
  ansible.builtin.shell: |
    cd {{ postgres_app_dir }}
    docker compose up -d
  become: true
  become_user: "{{ deploy_user }}"
  register: compose_result
  changed_when: "'Started' in compose_result.stdout or 'Creating' in compose_result.stdout"
